<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Sayfa Bulunamadı</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e5eef9;
      --muted: #94a3b8;
      --accent: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a 0%, var(--bg) 62%);
      color: var(--text);
    }
    .card {
      width: min(720px, 100%);
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.38);
      padding: 28px;
      text-align: center;
    }
    img {
      width: min(360px, 100%);
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    h1 { margin: 18px 0 10px; font-size: clamp(2rem, 5vw, 3rem); }
    p { margin: 0 auto; max-width: 46ch; color: var(--muted); line-height: 1.65; }
    .actions { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 160px; padding: 12px 16px; border-radius: 999px; text-decoration: none;
      border: 1px solid var(--border); color: var(--text); background: rgba(30,41,59,0.78);
    }
    a.primary { background: var(--accent); color: #0f172a; font-weight: 700; border-color: transparent; }
  </style>
</head>
<body>
  <main class="card">
    <img src="https://http.cat/404" alt="404 cat" referrerpolicy="no-referrer">
    <h1>Sayfa bulunamadı</h1>
    <p>Aradığın içerik burada yok, taşınmış olabilir ya da URL yanlış yazılmış olabilir.</p>
    <div class="actions">
      <a class="primary" href="/">Ana sayfaya dön</a>
      <a href="javascript:history.back()">Geri git</a>
    </div>
  </main>
</body>
</html>
